name: Production Integrity Check and Auto Deploy Pipeline

on:
  push:
    branches: [main]

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repo Context
        uses: actions/checkout@v4

      - name: Code Integrity Assessment
        run: |
          echo "Initiating HTML Document Integrity Scans..."
          test -f index.html || (echo "FATAL: core file index.html missed from path root" && exit 1)
          echo "Sanity confirmation complete. Integrity stable."

      - name: Deploy Production Artifact to GitHub Pages
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true # Suppresses static override if deploying natively via the GitHub interface settings
